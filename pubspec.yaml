name: sadeceben
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  # ✅ TÜRKÇE DİL DESTEĞİ İÇİN BU PAKET EKLENDİ
  flutter_localizations:
    sdk: flutter
  scratcher: ^2.5.0
